services:
  specialist-controller:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn hea.services.specialist_controller.app:app --host 0.0.0.0 --port 8000
    user: "0:0"
    env_file:
      - .env
    environment:
      HEA_DB_PATH: /app/data/hea.sqlite
    ports:
      - "8107:8000"
    volumes:
      - hea_data:/app/data

  patient-controller:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn hea.services.patient_controller.app:app --host 0.0.0.0 --port 8000
    user: "0:0"
    env_file:
      - .env
    environment:
      HEA_DB_PATH: /app/data/hea.sqlite
    ports:
      - "8106:8000"
    volumes:
      - hea_data:/app/data

  specialist-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    command: python -m hea.bots.specialist_bot.bot
    env_file:
      - .env
    environment:
      SPECIALIST_CONTROLLER_HOST: http://specialist-controller:8000
    depends_on:
      - specialist-controller

  user-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    command: python -m hea.bots.user_bot.bot
    env_file:
      - .env
    environment:
      PATIENT_CONTROLLER_HOST: http://patient-controller:8000
    depends_on:
      - patient-controller

volumes:
  hea_data:
